<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGrad)"/>
  
  <!-- Wallet Base -->
  <g filter="url(#shadow)">
    <rect x="30" y="55" width="132" height="90" rx="12" fill="#ffffff"/>
    <rect x="30" y="55" width="132" height="30" rx="12" fill="#e5e7eb"/>
    <rect x="30" y="73" width="132" height="12" fill="#e5e7eb"/>
  </g>
  
  <!-- Wallet Flap -->
  <path d="M30 67 Q30 55 42 55 L150 55 Q162 55 162 67 L162 75 Q162 82 150 82 L42 82 Q30 82 30 75 Z" fill="#d1d5db"/>
  
  <!-- Coin Stack -->
  <g filter="url(#shadow)">
    <!-- Bottom coin -->
    <ellipse cx="135" cy="115" rx="28" ry="10" fill="#d97706"/>
    <ellipse cx="135" cy="112" rx="28" ry="10" fill="url(#coinGrad)"/>
    
    <!-- Middle coin -->
    <ellipse cx="135" cy="100" rx="28" ry="10" fill="#d97706"/>
    <ellipse cx="135" cy="97" rx="28" ry="10" fill="url(#coinGrad)"/>
    
    <!-- Top coin -->
    <ellipse cx="135" cy="85" rx="28" ry="10" fill="#d97706"/>
    <ellipse cx="135" cy="82" rx="28" ry="10" fill="url(#coinGrad)"/>
  </g>
  
  <!-- TL Symbol on top coin -->
  <text x="135" y="87" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle">₺</text>
  
  <!-- Chart Arrow Up -->
  <g filter="url(#shadow)">
    <path d="M45 130 L65 110 L85 120 L105 95" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polygon points="105,85 115,100 100,100" fill="#10b981"/>
  </g>
  
  <!-- Small decorative circles -->
  <circle cx="50" cy="70" r="4" fill="#10b981" opacity="0.6"/>
  <circle cx="65" cy="70" r="4" fill="#10b981" opacity="0.6"/>
  <circle cx="80" cy="70" r="4" fill="#10b981" opacity="0.6"/>
</svg>
