<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Wallet Base -->
  <g filter="url(#shadow)">
    <rect x="70" y="140" width="372" height="250" rx="32" fill="#ffffff"/>
    <rect x="70" y="140" width="372" height="80" rx="32" fill="#e5e7eb"/>
    <rect x="70" y="188" width="372" height="32" fill="#e5e7eb"/>
  </g>
  
  <!-- Wallet Flap -->
  <path d="M70 172 Q70 140 102 140 L410 140 Q442 140 442 172 L442 195 Q442 215 410 215 L102 215 Q70 215 70 195 Z" fill="#d1d5db"/>
  
  <!-- Coin Stack -->
  <g filter="url(#shadow)">
    <!-- Bottom coin -->
    <ellipse cx="365" cy="320" rx="75" ry="28" fill="#d97706"/>
    <ellipse cx="365" cy="310" rx="75" ry="28" fill="url(#coinGrad)"/>
    
    <!-- Middle coin -->
    <ellipse cx="365" cy="275" rx="75" ry="28" fill="#d97706"/>
    <ellipse cx="365" cy="265" rx="75" ry="28" fill="url(#coinGrad)"/>
    
    <!-- Top coin -->
    <ellipse cx="365" cy="230" rx="75" ry="28" fill="#d97706"/>
    <ellipse cx="365" cy="220" rx="75" ry="28" fill="url(#coinGrad)"/>
  </g>
  
  <!-- TL Symbol on top coin -->
  <text x="365" y="232" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#92400e" text-anchor="middle">₺</text>
  
  <!-- Chart Arrow Up -->
  <g filter="url(#shadow)">
    <path d="M110 360 L170 290 L230 330 L290 250" stroke="#10b981" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polygon points="290,220 320,265 275,265" fill="#10b981"/>
  </g>
  
  <!-- Small decorative circles -->
  <circle cx="125" cy="180" r="12" fill="#10b981" opacity="0.6"/>
  <circle cx="165" cy="180" r="12" fill="#10b981" opacity="0.6"/>
  <circle cx="205" cy="180" r="12" fill="#10b981" opacity="0.6"/>
</svg>
